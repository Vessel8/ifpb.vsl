<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Adicionar filme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
<div class="container mt-4">
    <h2>Adicionar filme</h2>

    <form th:action="@{/filmes/novo}" method="post" th:object="${filme}" class="needs-validation">

        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
            Por favor, corrija os erros abaixo e tente novamente.
        </div>

        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" class="form-control" th:field="*{titulo}"
                   th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid' : (${filme.titulo != null} ? 'is-valid' : '')">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
            <div class="valid-feedback" th:unless="${#fields.hasErrors('titulo')}" th:if="${filme.titulo != null}">
                Ok!</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Data de Lançamento</label>
            <input type="date" class="form-control" th:field="*{dataLancamento}"
                   th:classappend="${#fields.hasErrors('dataLancamento')} ? 'is-invalid' : (${filme.dataLancamento != null} ? 'is-valid' : '')">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('dataLancamento')}" th:errors="*{dataLancamento}"></div>
            <div class="valid-feedback" th:unless="${#fields.hasErrors('dataLancamento')}" th:if="${filme.dataLancamento != null}">
                Ok!</div>
        </div>

        <button type="submit" class="btn btn-primary">Salvar filme</button>
        <a href="/filmes" class="btn btn-danger">Cancelar</a>
    </form>
</div>
</body>

</html>
