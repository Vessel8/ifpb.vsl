<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Adicionar curso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">
    <h2><i class="bi bi-plus-circle-fill me-3"></i>Novo curso</h2>
    <p class=" text-muted">Favor, não deixe nada em branco</p>
    <form th:action="@{/courses/add}" method="post" th:object="${course}" class="needs-validation">
        <!-- Thymeleaf automatically adds CSRF token here -->
        <!--<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->
        <!-- Global Error Alert -->
        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
            Favor, escrever direito...
        </div>

        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-clipboard me-1"></i></i>Nome <span class="text-danger">*</span></label>
            <input type="text" class="form-control"
                   th:field="*{courseName}"
                   th:classappend="${#fields.hasErrors('courseName')} ? 'is-invalid' : (${course.courseName != null} ? 'is-valid' : '')"
                   autofocus>
            <!-- Error message for invalid input -->
            <div class="invalid-feedback" th:if="${#fields.hasErrors('courseName')}" th:errors="*{courseName}"></div>
            <!-- Valid feedback for correct input -->
            <div class="valid-feedback" th:unless="${#fields.hasErrors('courseName')}" th:if="${course.courseName != null}">Ok!</div>
        </div>

        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-clock-history me-1"></i>Duração <span class="text-danger">*</span></label>
            <input type="text" class="form-control"
                   th:field="*{durationHours}"
                   th:classappend="${#fields.hasErrors('durationHours')} ? 'is-invalid' : (${course.durationHours != null} ? 'is-valid' : '')"
                   autofocus>
            <!-- Error message for invalid input -->
            <div class="invalid-feedback" th:if="${#fields.hasErrors('durationHours')}" th:errors="*{durationHours}"></div>
            <!-- Valid feedback for correct input -->
            <div class="valid-feedback" th:unless="${#fields.hasErrors('durationHours')}" th:if="${course.durationHours != null}">Ok!</div>
        </div>

        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-cash-stack me-1"></i>Preço <span class="text-danger">*</span>
            </label>
            <div class="input-group">
                <span class="input-group-text">R$</span>
                <input type="number" class="form-control"
                       th:field="*{price}"
                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : (${course.price > 0} ? 'is-valid' : '')"
                       step="0.01" placeholder="0.00">
                <!-- Error message for invalid input -->
                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                <!-- Valid feedback for correct input -->
                <div class="valid-feedback" th:unless="${#fields.hasErrors('price')}" th:if="${course.price > 0}">Ok!</div>
            </div>
            <div class="form-text">Preço deve estar entre R$1 e R$3000.00</div>
        </div>

        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-calendar3 me-1"></i>Data de lançamento <span class="text-danger">*</span>
            </label>
            <div class="input-group">
                <input type="date" class="form-control"
                       th:field="*{releaseDate}"
                       th:classappend="${#fields.hasErrors('releaseDate')} ? 'is-invalid' : (${course.releaseDate != null} ? 'is-valid' : '')">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('releaseDate')}" th:errors="*{releaseDate}"></div>
                <div class="valid-feedback" th:if="${course.releaseDate != null}">Ok!</div>
            </div>
        </div>


        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary mb-3"><i class="bi bi-plus-circle me-2"></i>Adicionar</button>
    </form>
    <hr>
    <a href="/courses" class="btn btn-danger"><i class="bi bi-arrow-left-circle me-2"></i>Cancelar</a>

    <form th:action="@{/logout}" method="post" style="display:inline;">
        <!-- Thymeleaf automatically adds CSRF token here -->
        <!--<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->
        <button type="submit" class="btn btn-success"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
    </form>

    <!-- Form Help -->
    <div class="row mt-4">
        <div class="col-lg-8">
            <div class="card bg-light">
                <div class="card-body">
                    <h6 class="card-title">
                        <i class="bi bi-info-circle-fill text-info me-2"></i>Normas
                    </h6>
                    <ul class="mb-0 small">
                        <li>Todos os campos com <span class="text-danger">*</span> são obrigatórios</li>
                        <li>Nome não pode estar em branco</li>
                        <li>Preço tem que estar entre $1 e $3000.00</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

</html>
