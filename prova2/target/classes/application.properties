spring.datasource.url=jdbc:mysql://localhost:3306/db_courses
spring.datasource.username=usuario
spring.datasource.password=usuario123
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# Verbose JPA
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Case-sensitive
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl


# Thymeleaf cache (disable in dev)
spring.thymeleaf.cache=false

# Docker container will not be closed when application shutdown
#spring.docker.compose.lifecycle-management=start_only

# Whether Docker Compose support is enabled
spring.docker.compose.enabled=false
# Enable or disable flyway
spring.flyway.enabled=false