<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar curso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <!-- Bootstrap Icons CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-3"><i class="bi bi-pencil-fill me-3"></i>Editar curso</h2>
    <p class=" text-muted">Atualize as informações abaixo</p>
    <form method="post" th:action="@{/courses/edit/{id}(id=${course.id})}" th:object="${course}">
        <!-- Thymeleaf automatically adds CSRF token here -->
        <!--<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->
        <!-- Global Error Alert -->
        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
            Favor corrigir erros abaixo
        </div>

        <input th:field="*{id}" type="hidden"/>  <!-- Keep ID hidden (not editable) -->

        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-clipboard me-1"></i>Nome <span class="text-danger">*</span></label>
            <input type="text" class="form-control"
                   th:field="*{courseName}"
                   th:classappend="${#fields.hasErrors('courseName')} ? 'is-invalid' : (${course.courseName != null} ? 'is-valid' : '')"
                   required autofocus>
            <!-- Error message for invalid input -->
            <div class="invalid-feedback" th:if="${#fields.hasErrors('courseName')}" th:errors="*{courseName}"></div>
            <!-- Valid feedback for correct input -->
            <div class="valid-feedback" th:unless="${#fields.hasErrors('courseName')}" th:if="${course.courseName != null}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-clock-history me-1"></i>Duração <span class="text-danger">*</span></label>
            <input type="text" class="form-control"
                   th:field="*{durationHours}"
                   th:classappend="${#fields.hasErrors('durationHours')} ? 'is-invalid' : (${course.durationHours != null} ? 'is-valid' : '')"
                   required autofocus>
            <!-- Error message for invalid input -->
            <div class="invalid-feedback" th:if="${#fields.hasErrors('durationHours')}" th:errors="*{durationHours}"></div>
            <!-- Valid feedback for correct input -->
            <div class="valid-feedback" th:unless="${#fields.hasErrors('durationHours')}" th:if="${course.durationHours != null}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-cash-stack me-1"></i>Preço <span class="text-danger">*</span>
            </label>
            <div class="input-group">
                <span class="input-group-text">R$</span>
                <input type="number" class="form-control"
                       th:field="*{price}"
                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : (${course.price > 0} ? 'is-valid' : '')"
                       step="0.01" placeholder="0.00" required>
                <!-- Error message for invalid input -->
                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                <!-- Valid feedback for correct input -->
                <div class="valid-feedback" th:unless="${#fields.hasErrors('price')}" th:if="${course.price > 0}">Ok</div>
            </div>
            <div class="form-text">Preço deve estar entre R$1 e R$3000.00</div>
        </div>

        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-calendar3 me-1"></i>Data de lançamento <span class="text-danger">*</span>
            </label>
            <div class="input-group">
                <input type="date" class="form-control"
                       th:field="*{releaseDate}"
                       th:classappend="${#fields.hasErrors('releaseDate')} ? 'is-invalid' : (${course.releaseDate != null} ? 'is-valid' : '')"
                       required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('releaseDate')}" th:errors="*{releaseDate}"></div>
                <div class="valid-feedback" th:if="${course.releaseDate != null}">Ok!</div>
            </div>
        </div>


        <!-- Submit Button -->
        <button class="btn btn-success" type="submit"><i class="bi bi-save me-2"></i> Salvar alterações</button>
        <a class="btn btn-danger" th:href="@{/courses}"><i class="bi bi-arrow-left-circle me-2"></i>Cancelar</a>
    </form>

    <!-- Form Help -->
    <div class="row mt-4">
        <div class="col-lg-8">
            <div class="card bg-light">
                <div class="card-body">
                    <h6 class="card-title">
                        <i class="bi bi-info-circle-fill text-info me-2"></i>Normas
                    </h6>
                    <ul class="mb-0 small">
                        <li>Todos os campos com <span class="text-danger">*</span> são obrigatórios</li>
                        <li>Nome não pode estar em branco</li>
                        <li>Preço tem que estar entre $1 e $3000.00</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
