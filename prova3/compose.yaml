services:
  mysql:
    image: 'mysql:8.1'
    container_name: db
    volumes:
      - vol_dados_courses_vsl:/var/lib/mysql
    environment:
      - 'MYSQL_DATABASE=${MYSQL_DATABASE}'
      - 'MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}'
      - 'MYSQL_USER=${MYSQL_USER}'
      - 'MYSQL_PASSWORD=${MYSQL_PASSWORD}'
    ports:
      - '3306:3306'
volumes:
  vol_dados_courses_vsl:
    name: "vol_dados_courses_vsl" # Set volume name